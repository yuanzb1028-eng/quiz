<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>刷题系统</title>
</head>
<body>

<h2 id="subject"></h2>
<p id="progress"></p>
<p id="question"></p>
<div id="options"></div>

<br>
<button onclick="prevQuestion()">上一题</button>
<button onclick="nextQuestion()">下一题</button>
<button onclick="showWrong()">错题模式</button>
<button onclick="reset()">返回题库</button>

<p id="result"></p>

<script>

let subjects = {
"界面设计":[
{q:"示例题1", options:["A","B","C","D"], answer:"A"},
{q:"示例题2", options:["A","B","C","D"], answer:"B"}
],
"数字影像":[
{q:"示例题", options:["A","B","C","D"], answer:"C"}
],
"电脑动画":[],
"艺术概论":[]
};

let currentSubject = "界面设计";
let originalQuestions = [...subjects[currentSubject]];
let questions = [...originalQuestions];
let index = 0;
let wrong = [];

function loadQuestion(){
document.getElementById("subject").innerText = currentSubject;
document.getElementById("progress").innerText = `第 ${index+1} / ${questions.length} 题`;
document.getElementById("question").innerText = questions[index].q;

let html="";
questions[index].options.forEach(opt=>{
html += `<button onclick="check('${opt[0]}')">${opt}</button><br>`;
});
document.getElementById("options").innerHTML = html;
document.getElementById("result").innerText="";
}

function check(ans){
if(ans===questions[index].answer){
document.getElementById("result").innerText="✅ 正确";
}else{
document.getElementById("result").innerText="❌ 错误";
wrong.push(questions[index]);
}
}

function nextQuestion(){
index++;
if(index>=questions.length){index=0;}
loadQuestion();
}

function prevQuestion(){
index--;
if(index<0){index=questions.length-1;}
loadQuestion();
}

function showWrong(){
if(wrong.length>0){
questions = [...wrong];
index=0;
loadQuestion();
}
}

function reset(){
questions = [...originalQuestions];
wrong = [];
index = 0;
loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
